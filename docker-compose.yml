services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull-gemma
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      OLLAMA_HOST=http://ollama:11434 ollama pull gemma3:1b
    restart: "no"

  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: langgraph-jupyter
    user: root
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./requirements.txt:/tmp/requirements.txt:ro
    environment:
      JUPYTER_TOKEN: langgraph
      OLLAMA_BASE_URL: http://ollama:11434
      NB_UID: "1000"
      NB_GID: "100"
      CHOWN_EXTRA: "/home/jovyan/work"
      CHOWN_EXTRA_OPTS: "-R"
    command:
      - bash
      - -lc
      - |
        pip install --no-cache-dir -r /tmp/requirements.txt && \
        start-notebook.py \
          --NotebookApp.token=$${JUPYTER_TOKEN:-langgraph} \
          --NotebookApp.password='' \
          --ServerApp.allow_origin='*' \
          --ServerApp.root_dir=/home/jovyan/work
    restart: unless-stopped

volumes:
  ollama_data:
